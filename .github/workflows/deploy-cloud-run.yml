# Deploy propabridge-web (marketing site) to Cloud Run on push to main.
#
# Repository secrets:
#   GCP_PROJECT_ID
#   GCP_REGION
#   GCP_SERVICE_NAME        — Cloud Run service id for this site (e.g. propabridge-web)
#   WORKLOAD_IDENTITY_PROVIDER
#   SERVICE_ACCOUNT_EMAIL
#
# Optional repository variable (Settings → Secrets and variables → Actions → Variables):
#   NEXT_PUBLIC_API_URL — defaults to https://api.propabridge.com

name: Deploy web to Cloud Run

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AR_REPO: propabridge-web
      AR_IMAGE: propabridge-web
      NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL || 'https://api.propabridge.com' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker "${{ secrets.GCP_REGION }}-docker.pkg.dev" --quiet

      - name: Build and push container image
        run: |
          IMAGE_URI="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.AR_IMAGE }}:${{ github.sha }}"
          docker build \
            --build-arg "NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}" \
            -t "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"
          echo "IMAGE_URI=${IMAGE_URI}" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ secrets.GCP_SERVICE_NAME }}
          region: ${{ secrets.GCP_REGION }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          image: ${{ env.IMAGE_URI }}
          flags: >-
            --allow-unauthenticated
            --max-instances=20
            --min-instances=0
            --platform=managed
